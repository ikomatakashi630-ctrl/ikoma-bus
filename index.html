<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --bg:#f4f6fa;--white:#fff;--border:#e2e6ef;
  --text:#1a1f36;--muted:#7a85a0;
  --north:#059669;--north-l:#d1fae5;--north-m:#6ee7b7;
  --south:#7c3aed;--south-l:#ede9fe;--south-m:#c4b5fd;
  --r79:#0ea5e9;--r79-l:#e0f2fe;--r79-m:#7dd3fc;
  --r8596:#e11d48;--r8596-l:#ffe4e6;--r8596-m:#fda4af;
  --loop:#059669;--loop-l:#d1fae5;--loop-m:#6ee7b7;
  --kitada:#d97706;--kitada-l:#fef3c7;--kitada-m:#fcd34d;
  --gakken:#0ea5e9;--gakken-l:#e0f2fe;--gakken-m:#7dd3fc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;}
.container{max-width:700px;margin:0 auto;padding:14px 12px 56px;}

header{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.header-left h1{font-size:17px;font-weight:900;line-height:1.3;}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.clock-block{text-align:right;}
.clock-time{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.clock-date{font-size:11px;color:var(--muted);margin-top:2px;}

.day-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.day-btn{padding:10px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .18s;}
.day-btn.active{background:var(--text);border-color:var(--text);color:#fff;}

.stop-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stop-tab{padding:12px 10px;border:2px solid var(--border);background:var(--white);color:var(--muted);font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:12px;transition:all .18s;text-align:center;position:relative;overflow:hidden;}
.stop-tab::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:var(--border);transition:background .2s;}
.stop-tab .ti{font-size:18px;display:block;margin-bottom:3px;}
.stop-tab .tn{font-size:13px;display:block;font-weight:900;}
.stop-tab .ts{font-size:10px;color:var(--muted);display:block;margin-top:2px;}
.stop-tab.active-north{border-color:var(--north);background:#f0fdf8;color:var(--north);}
.stop-tab.active-north::before{background:var(--north);}
.stop-tab.active-north .ts{color:var(--north);opacity:.7;}
.stop-tab.active-south{border-color:var(--south);background:#faf8ff;color:var(--south);}
.stop-tab.active-south::before{background:var(--south);}
.stop-tab.active-south .ts{color:var(--south);opacity:.7;}

.upcoming-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bus-card{border-radius:14px;padding:14px 15px;border:1.5px solid var(--border);background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.bus-card.secondary{background:var(--bg);box-shadow:none;}
.bus-card.primary.north{border-color:var(--north);}
.bus-card.primary.south{border-color:var(--south);}
.card-label{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:4px;}
.bus-card.primary.north .card-label{color:var(--north);}
.bus-card.primary.south .card-label{color:var(--south);}
.bus-card.secondary .card-label{color:var(--muted);}
.card-depart{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1;margin-bottom:2px;}
.bus-card.secondary .card-depart{font-size:28px;color:var(--muted);}
.card-wait{font-size:11px;color:var(--muted);margin-bottom:5px;}
.card-wait strong{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--text);}
.bus-card.secondary .card-wait strong{color:var(--muted);}
.card-dest{font-size:11px;font-weight:700;margin-bottom:4px;}
.card-route{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:7px;}
.arrival-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.bus-card.primary.north .arrival-pill{background:var(--north-l);color:var(--north);}
.bus-card.primary.south .arrival-pill{background:var(--south-l);color:var(--south);}
.bus-card.secondary .arrival-pill{background:var(--border);color:var(--muted);}
.pill-arr{font-family:'JetBrains Mono',monospace;font-size:13px;}

.legend{display:flex;flex-wrap:wrap;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:9px 13px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sec-title{font-size:10px;color:var(--muted);letter-spacing:3px;white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

.hour-row{display:flex;align-items:flex-start;gap:10px;padding:7px 12px;background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;}
.hour-lbl{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--muted);min-width:32px;text-align:right;padding-top:6px;}
.div-line{width:1px;min-height:30px;background:var(--border);flex-shrink:0;align-self:stretch;}
.minutes{display:flex;flex-wrap:wrap;gap:5px;flex:1;}

.chip{display:flex;flex-direction:column;align-items:center;font-family:'JetBrains Mono',monospace;padding:5px 7px;border-radius:8px;border:1.5px solid transparent;min-width:46px;cursor:default;transition:all .15s;}
.chip-dep{font-size:13px;font-weight:700;line-height:1;}
.chip-sub{font-size:9px;margin-top:2px;opacity:.8;font-family:'Zen Kaku Gothic New',sans-serif;text-align:center;line-height:1.2;}
.chip.t-loop{background:var(--loop-l);color:var(--loop);border-color:var(--loop-m);}
.chip.t-kitada{background:var(--kitada-l);color:var(--kitada);border-color:var(--kitada-m);}
.chip.t-gakken{background:var(--gakken-l);color:var(--gakken);border-color:var(--gakken-m);}
.chip.t-r79{background:var(--r79-l);color:var(--r79);border-color:var(--r79-m);}
.chip.t-r8596{background:var(--r8596-l);color:var(--r8596);border-color:var(--r8596-m);}
.chip.t-r8596s{background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff;}

.chip.is-next{transform:scale(1.1);animation:cpulse 1.5s ease-in-out infinite;}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 2px currentColor}50%{box-shadow:0 0 0 5px currentColor}}
.chip.is-next2{outline:2px dashed currentColor;outline-offset:2px;}
.chip.past{opacity:.2;}
.chip:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.1);}

.no-bus{text-align:center;padding:36px;color:var(--muted);font-size:14px;}
.updated{text-align:center;font-size:10px;color:var(--muted);margin-top:24px;padding-top:12px;border-top:1px solid var(--border);}
</style>
</head>

</div>

}
function setStop(s){
  cStop=s;
  document.getElementById('tabNorth').className='stop-tab'+(s==='north'?' active-north':'');
  document.getElementById('tabSouth').className='stop-tab'+(s==='south'?' active-south':'');
  render();
}

function getData(){return cStop==='north'?NORTH[cDay]:SOUTH[cDay];}

function getUpcoming(n=2){
  const{h,m}=getNow();const nm=toM(h,m);
  const data=getData();const all=[];
  for(const[hour,slots] of Object.entries(data)){
    const hr=parseInt(hour);
    for(const s of slots){
      const sm=toM(hr,s.m);
      if(sm>nm) all.push({h:hr,m:s.m,t:s.t,wait:sm-nm,sm});
    }
  }
  all.sort((a,b)=>a.sm-b.sm);
  return all.slice(0,n);
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('dateDisp').textContent=
    `${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())}（${days[n.getDay()]}）`;
}

function render(){
  const meta=STOP_META[cStop];
  const cls=meta.cls;
  document.getElementById('hTitle').textContent=meta.title;
  document.getElementById('hSub').textContent=meta.sub;
  document.getElementById('revised').textContent=meta.rev;

  // 凡例
  const leg=LEGENDS[cStop];
  document.getElementById('legend').innerHTML=leg.map(l=>
    `<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`
  ).join('');

  const{h:nh,m:nm}=getNow();const nowMs=toM(nh,nm);
  const upcoming=getUpcoming(2);

  // 次の便カード
  const nb=document.getElementById('upcoming');
  if(!upcoming.length){
    nb.innerHTML=`<div class="bus-card primary ${cls}" style="text-align:center;color:var(--muted);padding:20px;margin-bottom:14px;font-size:14px;">本日の運行は終了しました</div>`;
  } else {
    const labels=['▶ 次の便','▷ 次々の便'];
    let html='<div class="upcoming-grid">';
    for(let i=0;i<2;i++){
      const b=upcoming[i];
      if(!b){
        html+=`<div class="bus-card secondary" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;min-height:110px;">最終便</div>`;
        continue;
      }
      const cc=i===0?`bus-card primary ${cls}`:'bus-card secondary';
      const destMap={
        loop:'生駒台循環（外回り）',kitada:'北田原',gakken:'学研北生駒駅',
        r79:'田原台一丁目',r8596:'田原台一丁目',r8596s:'田原台一丁目'
      };
      const routeMap={
        loop:'77/84系統 via 新生駒台北口',kitada:'82系統 via 新生駒台北口',gakken:'189系統',
        r79:'79系統 via 北谷公園',r8596:'85/86系統 via 田原八丁目',r8596s:'96系統 ＊田原九丁目西経由'
      };
      html+=`<div class="${cc}">
        <div class="card-label">${labels[i]}</div>
        <div class="card-depart">${pad(b.h)}:${pad(b.m)}</div>
        <div class="card-wait"><strong>${b.wait}</strong> 分後</div>
        <div class="card-dest">${destMap[b.t]||''}</div>
        <div class="card-route">${routeMap[b.t]||''}</div>
      </div>`;
    }
    html+='</div>';
    nb.innerHTML=html;
  }

  // 時刻表
  const data=getData();
  const next1=upcoming[0],next2=upcoming[1];
  const cont=document.getElementById('timetable');
  let html='';let hasAny=false;
  const hours=Object.keys(data).map(Number).sort((a,b)=>a-b);
  for(const hour of hours){
    const slots=[...data[hour]].sort((a,b)=>a.m-b.m);
    if(!slots.length) continue;
    hasAny=true;
    const chips=slots.map(s=>{
      const sm=toM(hour,s.m);
      const isPast=sm<nowMs;
      const isN1=next1&&next1.h===hour&&next1.m===s.m&&next1.t===s.t;
      const isN2=!isN1&&next2&&next2.h===hour&&next2.m===s.m&&next2.t===s.t;
      return `<div class="chip t-${s.t}${isPast?' past':''}${isN1?' is-next':''}${isN2?' is-next2':''}">
        <span class="chip-dep">${pad(s.m)}</span>
        <span class="chip-sub">${CHIP_LABELS[s.t]||''}</span>
      </div>`;
    }).join('');
    html+=`<div class="hour-row">
      <div class="hour-lbl">${pad(hour)}</div>
      <div class="div-line"></div>
      <div class="minutes">${chips}</div>
    </div>`;
  }
  cont.innerHTML=hasAny?html:`<div class="no-bus">該当する便がありません</div>`;
}

// PWA Service Worker登録
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// Init
setDay(autoDay());
setStop('north');
updateClock();
setInterval(()=>{updateClock();render();},10000);
</script>
</body>
</html>
