<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="生駒バス">

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fa;--white:#fff;--border:#e2e6ef;
  --text:#1a1f36;--muted:#7a85a0;
  --north:#059669;--north-l:#d1fae5;
  --south:#7c3aed;--south-l:#ede9fe;
  --loop:#059669;--loop-l:#d1fae5;--loop-m:#6ee7b7;
  --kitada:#d97706;--kitada-l:#fef3c7;--kitada-m:#fcd34d;
  --gakken:#0ea5e9;--gakken-l:#e0f2fe;--gakken-m:#7dd3fc;
  --r79:#0ea5e9;--r79-l:#e0f2fe;--r79-m:#7dd3fc;
  --r8596:#e11d48;--r8596-l:#ffe4e6;--r8596-m:#fda4af;
  --r8596s:#7e22ce;--r8596s-l:#fdf4ff;--r8596s-m:#e9d5ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;}
.container{max-width:520px;margin:0 auto;padding:14px 12px 56px;}

header{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.header-left h1{font-size:17px;font-weight:900;}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.clock-block{text-align:right;}
.clock-time{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.clock-date{font-size:11px;color:var(--muted);margin-top:2px;}

.day-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.day-btn{padding:10px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .18s;}
.day-btn.active{background:var(--text);border-color:var(--text);color:#fff;}

/* 次の便カード */
/* 次の便リスト */
.upcoming-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.upc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;}
.upc-row.primary{border-color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.upc-row.secondary{background:var(--bg);}
.upc-label{font-size:10px;font-weight:700;color:var(--muted);min-width:52px;}
.upc-time{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1;min-width:72px;}
.upc-row.primary .upc-time{font-size:32px;}
.upc-row.secondary .upc-time{color:var(--muted);}
.upc-wait{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);min-width:68px;text-align:right;}
.upc-row.primary .upc-wait{color:var(--text);font-size:13px;}
.upc-noriba{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:6px;flex-shrink:0;}
.upc-noriba.north{background:var(--north);color:#fff;}
.upc-noriba.north2{background:#2563eb;color:#fff;}
.upc-noriba.south{background:var(--south);color:#fff;}
.upc-noriba.secondary-badge{background:var(--border);color:var(--muted);}
.upc-info{flex:1;min-width:0;}
.upc-dest{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.upc-route{font-size:10px;color:var(--muted);}

/* カード類（後方互換用に残すが非表示） */
.bus-card{display:none;}

/* 凡例 */
.legend{display:flex;flex-wrap:wrap;gap:7px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:9px 13px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}

/* 時刻表 */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sec-title{font-size:10px;color:var(--muted);letter-spacing:3px;white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

.hour-row{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;}
.hour-label-row{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid var(--border);background:#f8f9fc;}
.hour-lbl{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--muted);min-width:28px;}
.hour-count{font-size:10px;color:var(--muted);margin-left:8px;}
.bus-rows{padding:6px 10px;display:flex;flex-direction:column;gap:5px;}

/* 1便ごとの行 */
.bus-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;transition:background .15s;}
.bus-row:hover{background:var(--bg);}
.bus-row.is-next{background:var(--bg);outline:2px solid var(--text);animation:rowpulse 1.5s ease-in-out infinite;}
@keyframes rowpulse{0%,100%{outline-color:var(--text)}50%{outline-color:#7a85a0}}
.bus-row.is-next2{background:var(--bg);outline:2px dashed var(--border);}
.bus-row.is-next3{background:var(--bg);outline:1px dashed var(--border);opacity:.8;}
.bus-row.past{opacity:.22;}

.row-time{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;min-width:52px;}
.row-noriba{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:900;width:36px;height:36px;border-radius:8px;flex-shrink:0;}
.row-noriba.north{background:var(--north);color:#fff;}
.row-noriba.south{background:var(--south);color:#fff;}
.row-info{flex:1;min-width:0;}
.row-dest{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-route{font-size:10px;color:var(--muted);margin-top:1px;}
.row-type{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;margin-top:3px;}

.t-loop .row-type{background:var(--loop-l);color:var(--loop);}
.t-kitada .row-type{background:var(--kitada-l);color:var(--kitada);}
.t-gakken .row-type{background:var(--gakken-l);color:var(--gakken);}
.t-r79 .row-type{background:var(--r79-l);color:var(--r79);}
.t-r8596 .row-type{background:var(--r8596-l);color:var(--r8596);}
.t-r8596s .row-type{background:var(--r8596s-l);color:var(--r8596s);}

.no-bus{text-align:center;padding:36px;color:var(--muted);}
.updated{text-align:center;font-size:10px;color:var(--muted);margin-top:20px;padding-top:12px;border-top:1px solid var(--border);}
</style>
</head>

    22:[{m:1,t:'r79'},{m:18,t:'r8596s'},{m:40,t:'r8596'},{m:58,t:'r8596s'}],
    23:[{m:19,t:'r8596s'}],
    24:[],
  }
};

const DEST={loop:'生駒台循環（外回り）',kitada:'北田原',gakken:'学研北生駒駅',n2loop:'生駒台循環（内回り）',n2s:'新生駒台北口止め',r79:'田原台一丁目',r8596:'田原台一丁目',r8596s:'田原台一丁目'};
const ROUTE={loop:'77/84系統',kitada:'82系統',gakken:'189系統',n2loop:'78/80系統',n2s:'80系統 新生駒台北口止め',r79:'79系統 via 北谷公園',r8596:'85/86系統 via 田原八丁目',r8596s:'96系統＊ 田原九丁目西経由'};
const CHIP={loop:'外回り',kitada:'北田原',gakken:'学研',n2loop:'内回り',n2s:'内回り＊',r79:'79',r8596:'85/86',r8596s:'96＊'};

let cDay='weekday';

function pad(n){return String(n).padStart(2,'0');}
function toM(h,m){return h*60+m;}
function getNow(){const n=new Date();return{h:n.getHours(),m:n.getMinutes(),s:n.getSeconds()};}
function getNowSec(){const n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();}
function autoDay(){const d=new Date().getDay();return(d===0||d===6)?'weekend':'weekday';}

function setDay(d){
  cDay=d;
  document.getElementById('btnWD').className='day-btn'+(d==='weekday'?' active':'');
  document.getElementById('btnWE').className='day-btn'+(d==='weekend'?' active':'');
  render();
}

// 全便を時刻順に混合
function mergeAll(){
  const all=[];
  const nd=NORTH[cDay], n2d=NORTH2[cDay], sd=SOUTH[cDay];
  const addSlots=(data,stop)=>{
    for(const[hour,slots] of Object.entries(data)){
      const hr=parseInt(hour);
      for(const s of slots) all.push({h:hr,m:s.m,t:s.t,stop,sm:toM(hr,s.m)});
    }
  };
  addSlots(nd,'north');
  addSlots(n2d,'north2');
  addSlots(sd,'south');
  all.sort((a,b)=>a.sm-b.sm||a.stop.localeCompare(b.stop));
  return all;
}

function getUpcoming(all,n=3){
  const ns=getNowSec();
  const future=all.filter(b=>b.sm*60>ns);
  const deduped=[];
  for(const item of future){
    if(!deduped.length||deduped[deduped.length-1].sm!==item.sm) deduped.push(item);
  }
  return deduped.slice(0,n).map(b=>{
    const rem=b.sm*60-ns;
    b.waitMin=Math.floor(rem/60);
    b.waitSec=rem%60;
    return b;
  });
}

function render(){
  const{h:nh,m:nm}=getNow();const nowMs=toM(nh,nm);
  const all=mergeAll();
  const upcoming=getUpcoming(all,3);
  const next1=upcoming[0],next2=upcoming[1],next3=upcoming[2];

  // 次の便カード
  const labels=['▶ 次','▷ 次々','▸ 次々々'];
  let upHtml='<div class="upcoming-list">';
  for(let i=0;i<3;i++){
    const b=upcoming[i];
    if(!b){
      upHtml+=`<div class="upc-row secondary"><div class="upc-label">${labels[i]}</div><div class="upc-time" style="font-size:16px;color:var(--muted);">最終便</div></div>`;
      continue;
    }
    const noribaNum=b.stop==='north'?'1北':b.stop==='north2'?'2北':'2南';
    const noribaLabel=b.stop==='north'?'北口1番':b.stop==='north2'?'北口2番':'南口2番';
    const cc=i===0?'upc-row primary':'upc-row secondary';
    const badgeCls=i===0?b.stop:'secondary-badge';
    upHtml+=`<div class="${cc}">
      <div class="upc-label">${labels[i]}</div>
      <div class="upc-time">${pad(b.h)}:${pad(b.m)}</div>
      <div class="upc-noriba ${badgeCls}" title="${noribaLabel}">${noribaNum}</div>
      <div class="upc-info">
        <div class="upc-dest">${DEST[b.t]||''}</div>
        <div class="upc-route">${ROUTE[b.t]||''}</div>
      </div>
      <div class="upc-wait">${b.waitMin}分${pad(b.waitSec)}秒</div>
    </div>`;
  }
  upHtml+='</div>';
  document.getElementById('upcoming').innerHTML=upHtml;

  // 時刻表（時間ごとにグループ）
  const byHour={};
  for(const b of all){
    if(!byHour[b.h]) byHour[b.h]=[];
    byHour[b.h].push(b);
  }
  const hours=Object.keys(byHour).map(Number).sort((a,b)=>a-b);
  let html='';
  for(const hour of hours){
    const slots=byHour[hour];
    if(!slots.length) continue;
    const rows=slots.map(b=>{
      const isPast=b.sm<nowMs;
      const isN1=next1&&next1.sm===b.sm&&next1.stop===b.stop&&next1.t===b.t;
      const isN2=!isN1&&next2&&next2.sm===b.sm&&next2.stop===b.stop&&next2.t===b.t;
      const isN3=!isN1&&!isN2&&next3&&next3.sm===b.sm&&next3.stop===b.stop&&next3.t===b.t;
      const noribaNum=b.stop==='north'?'1':'2';
      return `<div class="bus-row t-${b.t}${isPast?' past':''}${isN1?' is-next':''}${isN2?' is-next2':''}${isN3?' is-next3':''}">
        <div class="row-time">${pad(b.m)}</div>
        <div class="row-noriba ${b.stop}">${noribaNum}</div>
        <div class="row-info">
          <div class="row-dest">${DEST[b.t]||''}</div>
          <div class="row-route">${ROUTE[b.t]||''}</div>
          <span class="row-type">${CHIP[b.t]||''}</span>
        </div>
      </div>`;
    }).join('');
    html+=`<div class="hour-row">
      <div class="hour-label-row">
        <div class="hour-lbl">${pad(hour)}</div>
        <div class="hour-count">${slots.length}便</div>
      </div>
      <div class="bus-rows">${rows}</div>
    </div>`;
  }
  document.getElementById('timetable').innerHTML=html||'<div class="no-bus">該当する便がありません</div>';
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('dateDisp').textContent=
    `${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())}（${days[n.getDay()]}）`;
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

setDay(autoDay());
updateClock();
setInterval(()=>{updateClock();render();},1000);
</script>
</body>
</html>
